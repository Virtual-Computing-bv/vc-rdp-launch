name: Build, sign & release

# Draait bij het pushen van een versietag (bijv. v1.0.1).
# Bouwt met de in-box C#-compiler, tekent met Azure Artifact Signing (OIDC,
# geen secrets-key), verpakt de Intune .intunewin en publiceert de release.
on:
  push:
    tags: ['v*']
  workflow_dispatch: {}   # handmatig starten kan ook

permissions:
  id-token: write   # nodig voor OIDC-login bij Azure
  contents: write   # nodig om de GitHub-release te maken

env:
  ACS_ENDPOINT: https://weu.codesigning.azure.net/
  ACS_ACCOUNT: VCSigning
  ACS_PROFILE: CodeSigning
  CSC: C:\Windows\Microsoft.NET\Framework64\v4.0.30319\csc.exe

jobs:
  release:
    runs-on: windows-2022
    environment: release   # federated credential is gekoppeld aan deze environment
    steps:
      - uses: actions/checkout@v5

      - name: Azure login (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # 1) Launcher bouwen
      - name: Compile launcher
        shell: pwsh
        run: |
          & $env:CSC /nologo /target:winexe /platform:x64 `
            /out:build\vc-rdp-launch.exe /win32icon:src\red.ico `
            /r:System.Windows.Forms.dll src\VcRdpLaunch.cs
          if ($LASTEXITCODE -ne 0) { throw "launcher-build faalde" }

      # 2) Launcher tekenen (VOOR embedden, zodat de uitgepakte launcher ook gesigned is)
      - name: Sign launcher
        uses: azure/artifact-signing-action@v2
        with:
          endpoint: ${{ env.ACS_ENDPOINT }}
          signing-account-name: ${{ env.ACS_ACCOUNT }}
          certificate-profile-name: ${{ env.ACS_PROFILE }}
          files-folder: ${{ github.workspace }}\build
          files-folder-filter: exe

      # 3) Setup bouwen (embedt de gesignde launcher)
      - name: Compile setup
        shell: pwsh
        run: |
          & $env:CSC /nologo /target:winexe /platform:x64 `
            /out:build\vc-rdp-setup.exe /win32manifest:src\setup.manifest `
            /resource:build\vc-rdp-launch.exe,vc-rdp-launch.exe /win32icon:src\red.ico `
            /r:System.Windows.Forms.dll src\VcRdpSetup.cs
          if ($LASTEXITCODE -ne 0) { throw "setup-build faalde" }

      # 4) Setup tekenen (launcher wordt meegetekend; onschadelijk)
      - name: Sign setup
        uses: azure/artifact-signing-action@v2
        with:
          endpoint: ${{ env.ACS_ENDPOINT }}
          signing-account-name: ${{ env.ACS_ACCOUNT }}
          certificate-profile-name: ${{ env.ACS_PROFILE }}
          files-folder: ${{ github.workspace }}\build
          files-folder-filter: exe

      # 5) Intune .intunewin maken met Microsofts Content Prep Tool
      - name: Package .intunewin
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path intune\source | Out-Null
          Copy-Item build\vc-rdp-setup.exe intune\source\ -Force
          Invoke-WebRequest -UseBasicParsing `
            -Uri "https://github.com/microsoft/Microsoft-Win32-Content-Prep-Tool/raw/master/IntuneWinAppUtil.exe" `
            -OutFile intune\IntuneWinAppUtil.exe
          & intune\IntuneWinAppUtil.exe -c intune\source -s vc-rdp-setup.exe -o intune -q
          if (-not (Test-Path intune\vc-rdp-setup.intunewin)) { throw ".intunewin niet gemaakt" }

      # 6) Verifiëren dat de handtekening geldig is
      - name: Verify signature
        shell: pwsh
        run: |
          $s = Get-AuthenticodeSignature build\vc-rdp-setup.exe
          "setup: $($s.Status)  signer=$($s.SignerCertificate.Subject)"
          if ($s.Status -ne 'Valid') { throw "setup niet geldig gesigned: $($s.Status)" }

      # 7) Release publiceren met de assets
      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = $env:GITHUB_REF_NAME
          gh release view $tag 2>$null
          if ($LASTEXITCODE -ne 0) {
            gh release create $tag --title "$tag — gesigned" --notes "Gesigned met Azure Artifact Signing (Virtual Computing BV). Zie SIGNING.md."
          }
          gh release upload $tag `
            build\vc-rdp-setup.exe build\vc-rdp-launch.exe intune\vc-rdp-setup.intunewin --clobber
